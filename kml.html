<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UNIFIL GIS Vector Workspace</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@9.2.4/ol.css">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">

<style>
*, *::before, *::after{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

:root{
  --bg:#0d0f12;
  --panel:#13161b;
  --panel2:#1a1e25;
  --border:#2a2f38;
  --border2:#353c48;
  --text:#e2e8f0;
  --text2:#8896a7;
  --text3:#4a5568;
  --accent:#00d4aa;
  --accent2:#0099ff;
  --danger:#ff4444;
  --radius:6px;
  --font:'IBM Plex Sans',sans-serif;
  --mono:'IBM Plex Mono',monospace;
}

body{
  font-family:var(--font);
  background:var(--bg);
  color:var(--text);
  height:100vh;
  display:flex;
  flex-direction:column;
  overflow:hidden;
  font-size:13px;
}

/* Splash/Loading Screen Styles */
#splash-screen {
  position: fixed;
  inset: 0;
  background: var(--bg);
  z-index: 9999;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  transition: opacity 0.5s ease, visibility 0.5s;
}

#splash-screen.fade-out {
  opacity: 0;
  visibility: hidden;
}

.spinner {
  width: 40px;
  height: 40px;
  border: 3px solid var(--panel2);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin-bottom: 16px;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.splash-status {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text2);
  letter-spacing: 1px;
  text-align: center;
  max-width: 80%;
  line-height: 1.6;
}

#topbar{
  height:44px;
  background:var(--panel);
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  padding:0 16px;
  gap:16px;
  flex-shrink:0;
  z-index:100;
}

.logo{
  font-family:var(--mono);
  font-size:12px;
  font-weight:500;
  color:var(--accent);
  letter-spacing:1px;
  text-transform:uppercase;
}

.sep{
  width:1px;
  height:20px;
  background:var(--border);
}

.topbar-title{
  font-size:12px;
  color:var(--text2);
}

.tag{
  font-family:var(--mono);
  font-size:10px;
  padding:2px 7px;
  border-radius:3px;
  font-weight:500;
}

.tag-g{
  background:rgba(0,212,170,.15);
  color:var(--accent);
  border:1px solid rgba(0,212,170,.3);
}

#main{
  flex:1;
  display:flex;
  overflow:hidden;
}

#sidebar{
  width:290px;
  min-width:290px;
  background:var(--panel);
  border-right:1px solid var(--border);
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

#sidebar-inner{
  flex:1;
  overflow-y:auto;
  padding-bottom:20px;
  display:flex;
  flex-direction:column;
}

.section{
  border-bottom:1px solid var(--border);
  padding:14px;
  flex-shrink:0;
}

.section.expandable{
  flex-grow:1;
  display:flex;
  flex-direction:column;
  min-height:220px;
  overflow:hidden;
  border-bottom:none;
}

.section-title{
  font-family:var(--mono);
  font-size:10px;
  font-weight:500;
  color:var(--text3);
  letter-spacing:1.5px;
  text-transform:uppercase;
  margin-bottom:12px;
}

#file-drop{
  margin-top:8px;
  border:1px dashed var(--border2);
  border-radius:var(--radius);
  padding:12px;
  text-align:center;
  cursor:pointer;
  position:relative;
}

#file-drop input[type=file]{
  position:absolute;
  inset:0;
  opacity:0;
  cursor:pointer;
}

.drop-label{
  font-size:12px;
  color:var(--text2);
}

#file-name{
  font-size:11px;
  color:var(--accent);
  margin-top:6px;
  font-family:var(--mono);
}

.btn svg { width:14px; height:14px; fill:none; stroke:currentColor; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
.btn { display:inline-flex; align-items:center; justify-content:center; gap:6px; padding:7px 12px; border-radius:var(--radius); border:1px solid var(--border2); background:transparent; color:var(--text2); cursor:pointer; font-size:12px; transition:all .15s; }

.btn:hover{
  border-color:var(--text2);
  color:var(--text);
}

.btn.primary{
  background:var(--accent);
  border-color:var(--accent);
  color:#000;
  font-weight:600;
}

.btn.primary:hover{
  background:#00f0c2;
}

.btn.danger{
  background:rgba(255,68,68,.1);
  border-color:var(--danger);
  color:var(--danger);
}

.btn.active{
  background:rgba(0,212,170,.12);
  border-color:var(--accent);
  color:var(--accent);
}

.btn-full{
  width:100%;
}

.tools-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:6px;
}

.style-row{
  display:flex;
  align-items:center;
  gap:8px;
  margin-bottom:8px;
}

.style-label{
  font-size:11px;
  color:var(--text2);
  width:80px;
}

.style-row input[type=color]{
  width:32px;
  height:26px;
}

.style-row input[type=range]{
  flex:1;
}

.style-row input[type=number],
.style-row input[type=text]{
  flex:1;
  background:var(--panel2);
  border:1px solid var(--border);
  border-radius:var(--radius);
  color:var(--text);
  padding:5px 8px;
}

#feature-editor-panel{
  display:none;
  margin-top:8px;
}

#feature-editor-panel.active{
  display:block;
}

#features-list{
  display:flex;
  flex-direction:column;
  gap:4px;
  flex-grow:1;
  overflow-y:auto;
}

.feat-item{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:6px 8px;
  background:var(--panel2);
  border:1px solid var(--border);
  border-radius:var(--radius);
  cursor:pointer;
}

.feat-item.selected{
  border-color:var(--accent2);
  background:rgba(0,153,255,.08);
}

.feat-info{
  flex:1;
  display:flex;
  gap:8px;
  align-items:center;
}

.feat-badge{
  font-family:var(--mono);
  font-size:9px;
  padding:2px 5px;
  border-radius:3px;
  width:45px;
  text-align:center;
}

.badge-point{
  background:rgba(0,212,170,.15);
  color:var(--accent);
}

.badge-line{
  background:rgba(0,153,255,.15);
  color:var(--accent2);
}

.badge-poly{
  background:rgba(168,85,247,.15);
  color:#c084fc;
}

.feat-trash-btn{
  background:none;
  border:none;
  color:var(--text3);
  cursor:pointer;
}

#export-panel{
  padding:14px;
  border-top:1px solid var(--border);
}

#map-wrap{
  flex:1;
  position:relative;
}

#map{
  width:100%;
  height:100%;
}

#toast{
  position:absolute;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:var(--panel2);
  border:1px solid var(--border2);
  color:var(--text);
  padding:8px 18px;
  border-radius:20px;
  font-size:12px;
  opacity:0;
  transition:.2s;
  z-index:999;
}

#toast.show{
  opacity:1;
}

#coords-bar{
  position:absolute;
  bottom:0;
  right:0;
  background:rgba(13,15,18,.85);
  font-family:var(--mono);
  font-size:11px;
  color:var(--text2);
  padding:4px 10px;
}
</style>
</head>

<body>

<!-- Workspace Initializing Overlay Window -->
<div id="splash-screen">
  <div class="spinner"></div>
  <div class="splash-status" id="splash-status">INITIALIZING WORKSPACE...</div>
</div>

<div id="topbar">
  <span class="logo">UNIFIL GIS</span>
  <div class="sep"></div>
  <span class="topbar-title">Unified Vector Workspace</span>
  <span class="tag tag-g">EPSG:3857 Native</span>
</div>

<div id="main">
  <div id="sidebar">
    <div id="sidebar-inner">
      <div class="section">
        <div class="section-title">Overlay Vector Layers</div>
        <div id="file-drop">
          <input type="file" id="map-file" accept=".kml" onchange="handleFile(this)">
          <div class="drop-label">Click / Drop Extra KML File</div>
        </div>
        <div id="file-name">Preloaded: base_map.tif (Auto-Cached)</div>
      </div>

      <div class="section">
        <div class="section-title">Interactions Toolset</div>
        <div class="tools-grid">
          <button class="btn active" id="tool-select" onclick="switchTool('select')">
            <svg viewBox="0 0 24 24"><path d="M5 3l14 9-7 1-4 7z"/></svg> Select & Edit
          </button>
          <button class="btn" id="tool-Point" onclick="switchTool('Point')">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/></svg> Add Point
          </button>
          <button class="btn" id="tool-LineString" onclick="switchTool('LineString')">
            <svg viewBox="0 0 24 24"><polyline points="5 19 12 12 19 5"/></svg> Add Line
          </button>
          <button class="btn" id="tool-Polygon" onclick="switchTool('Polygon')">
            <svg viewBox="0 0 24 24"><polygon points="12 2 22 8.5 22 15.5 12 22 2 15.5 2 8.5"/></svg> Polygon
          </button>
        </div>
      </div>

      <div class="section">
        <div class="section-title" id="style-title">Global Placement Styles</div>
        <div class="style-row">
          <span class="style-label">Label</span>
          <input type="text" id="s-label" oninput="pushStyleUpdate()">
        </div>
        <div class="style-row">
          <span class="style-label">Fill</span>
          <input type="color" id="s-fill" value="#0099ff" oninput="pushStyleUpdate()">
        </div>
        <div class="style-row">
          <span class="style-label">Opacity</span>
          <input type="range" id="s-fill-op" min="0" max="100" value="35" oninput="pushStyleUpdate()">
        </div>
        <div class="style-row">
          <span class="style-label">Stroke</span>
          <input type="color" id="s-stroke" value="#0055ff" oninput="pushStyleUpdate()">
        </div>
        <div class="style-row">
          <span class="style-label">Width</span>
          <input type="number" id="s-stroke-w" value="2" min="1" max="15" oninput="pushStyleUpdate()">
        </div>
        <div id="feature-editor-panel">
          <button class="btn danger btn-full" onclick="removeSelectedFeature()">Delete Feature</button>
        </div>
      </div>

      <div class="section expandable">
        <div class="section-title">Created Shapes (<span id="feat-count">0</span>)</div>
        <div id="features-list"></div>
      </div>
    </div>

    <div id="export-panel">
      <button class="btn primary btn-full" onclick="triggerKMLExport()">Export Workspace to KML</button>
    </div>
  </div>

  <div id="map-wrap">
    <div id="map"></div>
    <div id="toast"></div>
    <div id="coords-bar">---</div>
  </div>
</div>

<!-- 1. GeoTIFF External Binary Decoder Dependency Engine -->
<script src="https://cdn.jsdelivr.net/npm/geotiff@2.1.1/dist-browser/geotiff.js"></script>
<!-- 2. Core OpenLayers Map Client Infrastructure Engine -->
<script src="https://cdn.jsdelivr.net/npm/ol@9.2.4/dist/ol.js"></script>

<!-- 3. Primary Application Workspace Control Logic -->
<script>
let map;
let geotiffOverlayLayer;
let drawInteraction;
let selectInteraction;
let modifyInteraction;
let workspaceSource;
let workspaceLayer;

let targetSelectedFeature = null;
let trackingIdCounter = 0;

// INDEXEDDB DATABASE STRUCT FOR LOCAL STORAGE
const DB_NAME = 'UNIFIL_GIS_CACHE';
const STORE_NAME = 'rasters';
const MAP_KEY = 'base_map_tif';

function openCacheDatabase() {
  return new Promise((resolve, reject) => {
    try {
      if (!window.indexedDB) return reject(new Error("IndexedDB not supported in current browser target"));
      const request = indexedDB.open(DB_NAME, 1);
      request.onupgradeneeded = (e) => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains(STORE_NAME)) {
          db.createObjectStore(STORE_NAME);
        }
      };
      request.onsuccess = (e) => resolve(e.target.result);
      request.onerror = (e) => reject(e.target.error);
    } catch (err) {
      reject(err);
    }
  });
}

async function getCachedMapBlob() {
  const db = await openCacheDatabase();
  return new Promise((resolve, reject) => {
    const transaction = db.transaction(STORE_NAME, 'readonly');
    const store = transaction.objectStore(STORE_NAME);
    const request = store.get(MAP_KEY);
    request.onsuccess = () => resolve(request.result);
    request.onerror = () => reject(request.error);
  });
}

async function writeMapBlobToCache(blob) {
  const db = await openCacheDatabase();
  return new Promise((resolve, reject) => {
    const transaction = db.transaction(STORE_NAME, 'readwrite');
    const store = transaction.objectStore(STORE_NAME);
    const request = store.put(blob, MAP_KEY);
    request.onsuccess = () => resolve();
    request.onerror = () => reject(request.error);
  });
}

async function purgeCacheEntry() {
  try {
    const db = await openCacheDatabase();
    return new Promise((resolve, reject) => {
      const transaction = db.transaction(STORE_NAME, 'readwrite');
      const store = transaction.objectStore(STORE_NAME);
      const request = store.delete(MAP_KEY);
      request.onsuccess = () => resolve();
      request.onerror = () => reject(request.error);
    });
  } catch (e) {
    console.error("Cache purge failed:", e);
  }
}

function ensureDirectDropboxUrl(url) {
  if (!url) return url;
  let cleanUrl = url.trim();
  if (cleanUrl.includes('www.dropbox.com')) {
    cleanUrl = cleanUrl.replace('www.dropbox.com', 'dl.dropboxusercontent.com');
  }
  if (cleanUrl.includes('?dl=')) {
    cleanUrl = cleanUrl.split('?')[0];
  }
  return cleanUrl + '?dl=1';
}

function readStyleForm(){
  return{
    text:document.getElementById('s-label').value.trim(),
    fill:document.getElementById('s-fill').value,
    fillOpacity:parseInt(document.getElementById('s-fill-op').value),
    stroke:document.getElementById('s-stroke').value,
    width:parseInt(document.getElementById('s-stroke-w').value)
  };
}

function convertHexToRgba(hex,a){
  const r=parseInt(hex.slice(1,3),16);
  const g=parseInt(hex.slice(3,5),16);
  const b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a/100})`;
}

function compileFeatureStyle(config,selected){
  const strokeColor=selected?'#ffaa00':config.stroke;
  return new ol.style.Style({
    fill:new ol.style.Fill({
      color:convertHexToRgba(config.fill, config.fillOpacity)
    }),
    stroke:new ol.style.Stroke({
      color:strokeColor,
      width:config.width
    }),
    image:new ol.style.Circle({
      radius:6,
      fill:new ol.style.Fill({ color:strokeColor }),
      stroke:new ol.style.Stroke({ color:'#ffffff', width:2 })
    }),
    text:new ol.style.Text({
      text:config.text || '',
      font:'12px sans-serif',
      fill:new ol.style.Fill({ color:'#ffffff' }),
      stroke:new ol.style.Stroke({ color:'#000000', width:3 }),
      offsetY:-16
    })
  });
}

function updateSplashStatus(text) {
  document.getElementById('splash-status').textContent = text.toUpperCase();
}

function dismissSplashScreen() {
  const splash = document.getElementById('splash-screen');
  splash.classList.add('fade-out');
}

async function bootstrapGISWorkspace(){
  try {
    updateSplashStatus("Assembling Vector Viewports...");
    
    // SAFE INITIALIZATION ONLY AFTER DEPENDENCIES HAVE ARRIVED NATIVELY
    workspaceSource = new ol.source.Vector();
    workspaceLayer = new ol.layer.Vector({
      source: workspaceSource,
      zIndex: 10
    });

    map=new ol.Map({
      target:'map',
      layers:[workspaceLayer],
      view:new ol.View({
        center:ol.proj.fromLonLat([35.50,33.20]),
        zoom:10
      })
    });

    map.on('pointermove',function(evt){
      const lonLat=ol.proj.toLonLat(evt.coordinate);
      document.getElementById('coords-bar').textContent=
        `${lonLat[1].toFixed(5)}°N , ${lonLat[0].toFixed(5)}°E`;
    });

    selectInteraction=new ol.interaction.Select();
    modifyInteraction=new ol.interaction.Modify({
      features:selectInteraction.getFeatures()
    });

    selectInteraction.on('select',function(e){
      if(e.selected.length>0){
        handleFeatureSelectedEvent(e.selected[0]);
      }else{
        clearSelectedInspectorContext();
      }
    });

    map.addInteraction(selectInteraction);
    map.addInteraction(modifyInteraction);

    workspaceSource.on('addfeature',()=>{ rebuildFeatureTreeUI(); });
    workspaceSource.on('removefeature',()=>{ rebuildFeatureTreeUI(); });

    // NOTE: Replace this relative path below with your Dropbox live dataset link if accessing via cloud CDN!
    const rasterSourceLink = "./base_map.dat"; 
    await handleRasterCacheAndLoad(rasterSourceLink);

  } catch (error) {
    console.error(error);
    updateSplashStatus("Critical Boot Error. Check Web Console Logging.");
  }
}

async function handleRasterCacheAndLoad(url) {
  let blob = null;
  let isFromCache = false;
  
  try {
    updateSplashStatus("Checking local browser database cache...");
    blob = await getCachedMapBlob();
    
    // Check if entry exists and is not just a standard 404/Error HTML string
    if (blob && blob.size > 1000) {
      updateSplashStatus("Offline Cache Hit! Inspecting map file headers...");
      isFromCache = true;
    } else {
      if (blob) await purgeCacheEntry(); 
      blob = null;
    }
  } catch (e) {
    console.warn("Cache verification bypassed:", e);
  }

  if (!blob) {
    try {
      updateSplashStatus("Downloading Base GeoTIFF (~100MB+)... Please wait.");
      const directUrl = ensureDirectDropboxUrl(url);
      const response = await fetch(directUrl);
      if (!response.ok) {
        throw new Error(`Cloud Resource Retrieval Failed (Status: ${response.status})`);
      }
      blob = await response.blob();
      
      if (!blob || blob.size < 1000) {
        throw new Error("Downloaded data stream payload is structurally corrupt or empty.");
      }
    } catch (fetchErr) {
      updateSplashStatus("Download failed. Operating in vector-only fallback mode.");
      console.error(fetchErr);
      setTimeout(dismissSplashScreen, 3000);
      return;
    }
  }

  try {
    updateSplashStatus("Initializing WebGL accelerated raster components...");
    
    const tiffSource = new ol.source.GeoTIFF({
      sources: [{ blob: blob }]
    });

    geotiffOverlayLayer = new ol.layer.WebGLTile({
      source: tiffSource,
      zIndex: 1
    });

    map.addLayer(geotiffOverlayLayer);
    
    const viewConfig = await tiffSource.getView();
    if(viewConfig) {
      map.setView(new ol.View(viewConfig));
    }
    
    if (!isFromCache) {
      try {
        updateSplashStatus("Caching map file locally for future instant loads...");
        await writeMapBlobToCache(blob);
      } catch (cacheErr) {
        console.warn("Storage quota limits full. Skipping save layout step.", cacheErr);
      }
    }

    updateSplashStatus("Workspace Ready");
    dismissSplashScreen();
    displayNotification('Hardware Accelerated Raster Initialized');

  } catch (err) {
    console.error("Raster Engine Header Exception: ", err);
    
    if (isFromCache) {
      console.warn("Local cache payload structurally corrupted. Purging and recovering via cloud fallback stream...");
      await purgeCacheEntry();
      const targetUrl = ensureDirectDropboxUrl(url);
      if (targetUrl && !targetUrl.startsWith('./')) {
         handleRasterCacheAndLoad(url);
         return;
      }
    }
    
    updateSplashStatus("Invalid GeoTIFF format. Continuing in vector-only mode.");
    setTimeout(dismissSplashScreen, 3000);
  }
}

function switchTool(type){
  if(drawInteraction){
    map.removeInteraction(drawInteraction);
    drawInteraction=null;
  }

  if(type==='select'){
    selectInteraction.setActive(true);
    modifyInteraction.setActive(true);
  }else{
    selectInteraction.setActive(false);
    modifyInteraction.setActive(false);

    drawInteraction=new ol.interaction.Draw({
      source:workspaceSource,
      type:type
    });

    drawInteraction.on('drawend',function(evt){
      trackingIdCounter++;
      const cfg=readStyleForm();
      evt.feature.setProperties({
        uid:trackingIdCounter,
        meta_label:cfg.text,
        meta_fill:cfg.fill,
        meta_fill_op:cfg.fillOpacity,
        meta_stroke:cfg.stroke,
        meta_stroke_w:cfg.width
      });
      evt.feature.setStyle(compileFeatureStyle(cfg,false));
    });
    map.addInteraction(drawInteraction);
  }

  ['select','Point','LineString','Polygon'].forEach(id=>{
    document.getElementById('tool-'+id).classList.toggle('active',id===type);
  });
}

function handleFeatureSelectedEvent(feature){
  if(targetSelectedFeature && targetSelectedFeature!==feature){
    const oldCfg={
      text:targetSelectedFeature.get('meta_label'),
      fill:targetSelectedFeature.get('meta_fill'),
      fillOpacity:targetSelectedFeature.get('meta_fill_op'),
      stroke:targetSelectedFeature.get('meta_stroke'),
      width:targetSelectedFeature.get('meta_stroke_w')
    };
    targetSelectedFeature.setStyle(compileFeatureStyle(oldCfg,false));
  }

  targetSelectedFeature=feature;
  document.getElementById('feature-editor-panel').classList.add('active');
  document.getElementById('s-label').value=feature.get('meta_label') || '';
  document.getElementById('s-fill').value=feature.get('meta_fill') || '#0099ff';
  document.getElementById('s-fill-op').value=feature.get('meta_fill_op') || 35;
  document.getElementById('s-stroke').value=feature.get('meta_stroke') || '#0055ff';
  document.getElementById('s-stroke-w').value=feature.get('meta_stroke_w') || 2;

  const cfg=readStyleForm();
  feature.setStyle(compileFeatureStyle(cfg,true));
  rebuildFeatureTreeUI();
}

function clearSelectedInspectorContext(){
  if(targetSelectedFeature){
    const oldCfg={
      text:targetSelectedFeature.get('meta_label'),
      fill:targetSelectedFeature.get('meta_fill'),
      fillOpacity:targetSelectedFeature.get('meta_fill_op'),
      stroke:targetSelectedFeature.get('meta_stroke'),
      width:targetSelectedFeature.get('meta_stroke_w')
    };
    targetSelectedFeature.setStyle(compileFeatureStyle(oldCfg,false));
  }
  targetSelectedFeature=null;
  document.getElementById('feature-editor-panel').classList.remove('active');
  rebuildFeatureTreeUI();
}

function pushStyleUpdate(){
  if(!targetSelectedFeature) return;
  const cfg=readStyleForm();
  targetSelectedFeature.setProperties({
    meta_label:cfg.text,
    meta_fill:cfg.fill,
    meta_fill_op:cfg.fillOpacity,
    meta_stroke:cfg.stroke,
    meta_stroke_w:cfg.width
  });
  targetSelectedFeature.setStyle(compileFeatureStyle(cfg,true));
  rebuildFeatureTreeUI();
}

function rebuildFeatureTreeUI(){
  const list=document.getElementById('features-list');
  const feats=workspaceSource.getFeatures();
  document.getElementById('feat-count').textContent=feats.length;

  if(!feats.length){
    list.innerHTML='No shapes';
    return;
  }
  list.innerHTML='';

  feats.forEach(feat=>{
    const div=document.createElement('div');
    div.className='feat-item';
    if(targetSelectedFeature && targetSelectedFeature.get('uid')===feat.get('uid')){
      div.classList.add('selected');
    }

    const geom=feat.getGeometry().getType();
    let badge='POINT';
    let badgeClass='badge-point';

    if(geom==='LineString'){ badge='LINE'; badgeClass='badge-line'; }
    if(geom==='Polygon'){ badge='POLY'; badgeClass='badge-poly'; }

    div.innerHTML = `
      <div class="feat-info">
        <span class="feat-badge ${badgeClass}">${badge}</span>
        <span>${feat.get('meta_label') || 'Unnamed'}</span>
      </div>
      <button class="feat-trash-btn">✕</button>
    `;

    div.onclick=()=>{
      selectInteraction.getFeatures().clear();
      selectInteraction.getFeatures().push(feat);
      handleFeatureSelectedEvent(feat);
    };

    div.querySelector('.feat-trash-btn').onclick=(e)=>{
      e.stopPropagation();
      workspaceSource.removeFeature(feat);
    };
    list.appendChild(div);
  });
}

function removeSelectedFeature(){
  if(!targetSelectedFeature) return;
  workspaceSource.removeFeature(targetSelectedFeature);
  targetSelectedFeature=null;
  rebuildFeatureTreeUI();
}

function handleFile(input){
  if(!input.files[0]) return;
  const file = input.files[0];
  if(file.name.toLowerCase().endsWith('.kml')){
    importKMLFile(file);
  }
}

async function importKMLFile(blob){
  try{
    const text=await blob.text();
    const format=new ol.format.KML({ extractStyles:false });
    const feats=format.readFeatures(text,{
      dataProjection:'EPSG:4326',
      featureProjection:'EPSG:3857'
    });

    feats.forEach(feature=>{
      trackingIdCounter++;
      const cfg={
        text:feature.get('name') || `Imported ${trackingIdCounter}`,
        fill:'#00d4aa',
        fillOpacity:30,
        stroke:'#00ffaa',
        width:2
      };
      feature.setProperties({
        uid:trackingIdCounter,
        meta_label:cfg.text,
        meta_fill:cfg.fill,
        meta_fill_op:cfg.fillOpacity,
        meta_stroke:cfg.stroke,
        meta_stroke_w:cfg.width
      });
      feature.setStyle(compileFeatureStyle(cfg,false));
      workspaceSource.addFeature(feature);
    });

    map.getView().fit(workspaceSource.getExtent(), { padding:[40,40,40,40], duration:700 });
    displayNotification('KML Imported');
  }catch(err){
    displayNotification('KML Import Failed');
  }
}

function triggerKMLExport(){
  const feats=workspaceSource.getFeatures();
  if(!feats.length){
    displayNotification('No Features');
    return;
  }

  const previouslySelected = targetSelectedFeature;
  if(previouslySelected) {
    clearSelectedInspectorContext();
  }

  const format=new ol.format.KML();
  const kml=format.writeFeatures(feats,{
    featureProjection:'EPSG:3857',
    dataProjection:'EPSG:4326'
  });

  if(previouslySelected) {
    selectInteraction.getFeatures().push(previouslySelected);
    handleFeatureSelectedEvent(previouslySelected);
  }

  const blob=new Blob([kml], { type:'application/vnd.google-earth.kml+xml' });
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='workspace.kml';
  a.click();
}

let toastTimer;
function displayNotification(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>{ el.classList.remove('show'); },2500);
}

window.addEventListener('load',bootstrapGISWorkspace);
</script>
